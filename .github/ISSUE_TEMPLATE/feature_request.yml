name: Feature Request
description: Suggest a new connector, command, or capability
title: "[Feature] "
labels: ["feat"]

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "e.g. I need to sync data to Salesforce but there's no connector yet."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like drt to do?
      placeholder: "Describe the feature you'd like to see..."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New source connector
        - New destination connector
        - CLI command
        - Incremental sync / state
        - Performance
        - LLM / MCP integration
        - Orchestration (Dagster, Airflow)
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other tools have you tried?
      placeholder: "Describe any alternatives you've considered..."

  - type: textarea
    id: yaml-example
    attributes:
      label: Example YAML (if applicable)
      description: Show what the config would look like.
      render: yaml
