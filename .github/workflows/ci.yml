name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly nightly run (Mon 00:00 UTC) to catch env-drift / flaky tests
    # against fresh upstream dependencies, independent of PR/push activity.
    # TODO: wire failure notifications once an alerting convention exists
    # (see issue #539 follow-up — no slack/issues alert path defined yet).
    - cron: "0 0 * * 1"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        # SQL extras (postgres / mysql / clickhouse) ensure the destination
        # test suites actually run in CI rather than being silently skipped
        # by their `pytest.importorskip(...)` guards (#596 / #340 follow-up).
        # snowflake is omitted — its tests use sys.modules injection so the
        # heavy snowflake-connector-python install would only slow CI.
        # bigquery / gcs / parquet remain opt-in for the same reason.
        run: uv pip install --system -e ".[dev,mcp,duckdb,postgres,mysql,clickhouse]"

      - name: Dependency vulnerability scan (pip-audit)
        # Pinned version for reproducibility; bump in lockstep with Dependabot.
        # OSV is the vulnerability service used by GitHub Advisory DB and is
        # broader than PyPI-only sources for the Python ecosystem.
        # `--strict` makes pip-audit exit non-zero on warnings (e.g. skipped
        # packages) so silent gaps in coverage surface as CI failures.
        # Run on a single matrix entry (3.12) to avoid 4x duplicated work —
        # vuln data is python-version-independent.
        if: matrix.python-version == '3.12'
        run: |
          # GitHub-hosted runners may ship a pip version with a known OSV
          # advisory; upgrade before scanning so the audit passes cleanly.
          pip install --upgrade "pip>=26.1.2"
          pip install "pip-audit==2.10.0"
          # Allow-list: pass `--ignore-vuln GHSA-xxxx` here when a finding is
          # triaged as a known false positive. Keep this list empty by default
          # and document each entry in SECURITY.md.
          pip-audit \
            --strict \
            --vulnerability-service osv

      - name: Lint (ruff)
        run: ruff check drt tests

      - name: Type check (mypy)
        run: mypy drt

      - name: Check skills sync
        run: make check-skills

      - name: Check i18n sync
        run: make check-i18n || echo "::warning::Some translations are stale. Run 'make check-i18n' for details."

      - name: Check CHANGELOG covers all tagged versions
        # Requires git fetch --unshallow so the script can see v* tags
        # (checkout@v6 uses a shallow clone by default; tags are not
        # fetched). The check itself is fast — pure Python + one
        # git tag invocation.
        if: matrix.python-version == '3.12'
        run: |
          git fetch --tags --quiet
          make check-changelog

      - name: Check CHANGELOG entry on code-touching PR (warn-only)
        # Surfaces a warning — does NOT block merge — when a PR touches
        # drt/ or pyproject.toml without adding a CHANGELOG.md entry.
        # Bypass: dependabot (auto), or include `[skip changelog]` in
        # the PR description (CI/dep bumps, i18n marker updates).
        # See scripts/check_changelog_required.py and CONTRIBUTING.md.
        if: |
          github.event_name == 'pull_request' &&
          matrix.python-version == '3.12' &&
          github.event.pull_request.user.login != 'dependabot[bot]' &&
          !contains(github.event.pull_request.body, '[skip changelog]')
        run: |
          git fetch origin main --quiet
          python3 scripts/check_changelog_required.py origin/main HEAD \
            || echo "::warning::CHANGELOG.md not updated for this code-touching PR. See CONTRIBUTING.md."

      - name: Test (pytest)
        run: pytest --cov=drt --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
