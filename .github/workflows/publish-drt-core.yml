name: Publish drt-core to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    # Re-run lint/type/tests against the tagged commit before publishing,
    # so a tag pushed off a stale local can never ship without verification.
    # Mirrors the .github/workflows/ci.yml `test` job for the primary
    # Python version; the full matrix runs on PR / push@main / nightly.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,mcp,duckdb]"

      - name: Lint (ruff)
        run: ruff check drt tests

      - name: Type check (mypy)
        run: mypy drt

      - name: Test (pytest)
        run: pytest

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # for Trusted Publishing (no API token needed)
      contents: write  # for uploading SBOM to the GitHub Release

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (for SBOM scope)
        # SBOM must reflect what users actually install. Mirror the extras
        # set used by `verify` so optional integrations shipped to PyPI are
        # represented in the bill of materials.
        run: uv pip install --system -e ".[dev,mcp,duckdb]"

      - name: Generate CycloneDX SBOM
        run: |
          pip install "cyclonedx-bom==7.3.0"
          cyclonedx-py environment \
            --output-format JSON \
            --output-file drt-core-sbom.cdx.json \
            --pyproject pyproject.toml
          # Sanity-check the SBOM is non-empty JSON with a components list.
          python -c "import json; d=json.load(open('drt-core-sbom.cdx.json')); assert d.get('components'), 'SBOM has no components'"

      - name: Inject telemetry API key
        env:
          POSTHOG_WRITE_KEY: ${{ secrets.POSTHOG_WRITE_KEY }}
        run: |
          # If telemetry.py exists and the secret is set, replace the
          # placeholder _DEFAULT_API_KEY = None with the real key.
          # Fail-safe: if the secret is unset (community fork, accidental
          # config drift), the build proceeds with telemetry physically
          # disabled — is_enabled() short-circuits to False without a key.
          if [ ! -f drt/telemetry.py ]; then
            echo "drt/telemetry.py not present — skipping injection (pre-#446 release)."
            exit 0
          fi
          if [ -z "$POSTHOG_WRITE_KEY" ]; then
            echo "::warning::POSTHOG_WRITE_KEY secret not set — release will ship with telemetry disabled."
            exit 0
          fi
          python -c "
          import pathlib, os
          p = pathlib.Path('drt/telemetry.py')
          src = p.read_text()
          needle = '_DEFAULT_API_KEY: str | None = None'
          repl = f'_DEFAULT_API_KEY: str | None = \"{os.environ[\"POSTHOG_WRITE_KEY\"]}\"'
          if needle not in src:
              raise SystemExit(f'placeholder {needle!r} not found in {p} — refusing to build')
          p.write_text(src.replace(needle, repl, 1))
          "
          # Smoke check: the rebuilt module must report the key as truthy.
          PYTHONPATH=. python -c "from drt import telemetry; assert telemetry._DEFAULT_API_KEY, 'injection failed'"
          echo "Telemetry API key injected successfully."

      - name: Build
        run: uv build

      - name: Publish drt-core to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Attach SBOM to GitHub Release
        # `softprops/action-gh-release` creates the Release if missing and
        # uploads the SBOM as an asset. Only runs for tag pushes (which is
        # the only trigger for this workflow anyway).
        uses: softprops/action-gh-release@v2
        with:
          files: drt-core-sbom.cdx.json
          fail_on_unmatched_files: true
